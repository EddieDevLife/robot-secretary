name: Secretaria - responder comandos

# Como funciona (interacao assincrona):
# - schedule: o bot acorda em horarios fixos (09:00, 12:00, 15:00, 18:00 e 21:00
#   no horario de Brasilia), processa tudo que voce enviou desde a ultima vez e
#   confirma cada registro. Voce manda agora; a confirmacao chega no proximo
#   horario. Barato e nao precisa do PC ligado.
# - workflow_dispatch: voce dispara na mao (aba Actions > Run workflow) e o bot
#   fica escutando por ~5 minutos. Use para TESTAR na hora ou para "forcar" um
#   processamento fora dos horarios.
#
# Os horarios estao em UTC. America/Sao_Paulo e UTC-3 o ano todo, entao:
#   12:00 UTC = 09:00 BRT | 15:00 = 12:00 | 18:00 = 15:00 | 21:00 = 18:00 | 00:00 = 21:00
# Obs: o GitHub pode atrasar execucoes agendadas em alguns minutos em horarios de pico.

on:
  workflow_dispatch:
    inputs:
      duracao:
        description: "Segundos que o bot fica escutando (teste interativo)"
        required: false
        default: "300"
  schedule:
    - cron: "0 12 * * *"  # 09:00 BRT
    - cron: "0 15 * * *"  # 12:00 BRT
    - cron: "0 18 * * *"  # 15:00 BRT
    - cron: "0 21 * * *"  # 18:00 BRT
    - cron: "0 0 * * *"   # 21:00 BRT

# Evita duas execucoes ao mesmo tempo (uma confirmaria os updates da outra).
concurrency:
  group: secretaria-bot
  cancel-in-progress: false

jobs:
  responder:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Preparar o ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar as ferramentas de trabalho
        run: pip install -r requirements.txt

      - name: Escutar e responder comandos
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: |
          DURACAO="${{ github.event.inputs.duracao || '90' }}"
          python main.py bot --watch --interval 3 --max-runtime "$DURACAO"
